name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Offline by design: all LM Studio calls are mocked. The live smoke test
      # (scripts/smoke-test.ts) is manual-only and must never run here.
      - run: npm test
